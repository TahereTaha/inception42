
services:
  mariadb:
    build: ./requirements/mariadb
    container_name: my_mariadb
#   ports:
#     - "3306:3306"
    env_file: .env
    secrets:
      - mariadb_user
      - mariadb_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
  wordpress:
    build: ./requirements/wordpress
    container_name: my_wordpress
#   ports:
#     - "9000:9000"
    env_file: .env
    secrets:
      - mariadb_user
      - mariadb_password
      - wp_admin_user
      - wp_admin_password
      - wp_admin_email
      - wp_user
      - wp_user_password
      - wp_user_email
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
  nginx:
    build: ./requirements/nginx
    container_name: my_nginx
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception


volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tatahere/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tatahere/data/wordpress

networks:
  inception:
    driver: bridge

secrets:
  mariadb_user:
    file: ../secrets/MARIADB_USER
  mariadb_password:
    file: ../secrets/MARIADB_PASSWORD
  wp_admin_email:
    file: ../secrets/WP_ADMIN_EMAIL
  wp_admin_user:
    file: ../secrets/WP_ADMIN_USER
  wp_admin_password:
    file: ../secrets/WP_ADMIN_PASSWORD
  wp_user:
    file: ../secrets/WP_USER
  wp_user_email:
    file: ../secrets/WP_USER_EMAIL
  wp_user_password:
    file: ../secrets/WP_USER_PASSWORD




