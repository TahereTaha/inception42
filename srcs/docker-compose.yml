
services:
  mariadb:
    build: ./requirements/mariadb
    container_name: my_mariadb
    ports:
      - "3306:3306"
    env_file: .env
    secrets:
      - mariadb_user
      - mariadb_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
  wordpress:
    build: ./requirements/wordpress
    container_name: my_wordpress
    ports:
      - "9000:9000"
    env_file: .env
    secrets:
      - mariadb_user
      - mariadb_password
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
  nginx:
    build: ./requirements/nginx
    container_name: my_nginx
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    secrets:
      - mariadb_user
      - mariadb_password
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception


volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tatahere/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tatahere/data/wordpress

networks:
  inception:
    driver: bridge

secrets:
  mariadb_user:
    file: ../secrets/MARIADB_USER
  mariadb_password:
    file: ../secrets/MARIADB_PASSWORD



