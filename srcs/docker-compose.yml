
services:
  mariadb:
    build: ./requirements/mariadb
    container_name: my_mariadb
    ports:
      - "3306:3306"
    env_file: .env
    secrets:
      - mariadb_user
      - mariadb_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
  

volumes:
  mariadb_data:

networks:
  inception:

secrets:
  mariadb_user:
    file: ../secrets/MARIADB_USER
  mariadb_password:
    file: ../secrets/MARIADB_PASSWORD



